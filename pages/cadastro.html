<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta | Loja PCISMO!</title>

    <link rel="stylesheet" href="../CSS/estilo3.css">
</head>

<body>

    <div class="login-container">
        <div class="logo">PCISMO!<span>!</span></div>
        <h2>Crie sua conta!</h2>

        <form action="login.html">

            <div class="section-title">Dados pessoais</div>

            <div class="input-group">
                <label for="nome">Nome completo</label>
                <input type="text" id="nome" placeholder="Digite seu nome completo" required>
            </div>

            <div class="input-group">
                <label for="cpf">CPF ou CNPJ</label>
                <input type="text" id="cpf" placeholder="Digite seu CPF ou CNPJ" required>
            </div>

            <div class="input-group">
                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" placeholder="(00) 00000-0000">
            </div>

            <div class="section-title">Acesso</div>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="Digite seu e-mail" required>
            </div>

            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Crie uma senha" required>
            </div>

            <div class="input-group">
                <label for="confirm-password">Confirmar senha</label>
                <input type="password" id="confirm-password" placeholder="Repita a senha" required>
            </div>

            <button type="submit" class="btn-login">CRIAR CONTA</button>
        </form>

        <div class="divider">
            <span>OU</span>
        </div>
        <a href="login.html" class="btn-register">JÁ TENHO CONTA</a>

        <div class="footer-links">
            <a href="#">Termos de uso</a> &nbsp;|&nbsp;
            <a href="#">Política de privacidade</a>
        </div>
    </div>

</body>

</html>
